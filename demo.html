<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validity — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:      #0A0E1A;
            --surface: #111827;
            --border:  rgba(255,255,255,0.09);
            --border2: rgba(255,255,255,0.16);
            --text:    #E8E8E8;
            --text-mid:#9CA3AF;
            --text-dim:#4B5563;
            --sans:    'Inter', sans-serif;
            --mono:    'IBM Plex Mono', monospace;
        }

        body {
            font-family: var(--sans);
            background: #0A0E1A;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            opacity: 0.03;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            z-index: 999;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 28px 48px;
            border-bottom: 1px solid var(--border);
            background: rgba(10,14,26,0.94);
            backdrop-filter: blur(14px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-logo img { height: 28px; filter: brightness(1.1); }

        .header-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-dim);
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 28px 36px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.2s, border-color 0.2s;
        }

        .card:hover {
            background: #1a2235;
            border-color: var(--border2);
        }

        .card:hover .card-title { color: var(--text); }

        .card-industry {
            font-size: 18px;
            font-weight: 600;
            color: var(--text);
            letter-spacing: -0.2px;
        }

        .card-title {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            letter-spacing: 0.2px;
            transition: color 0.2s;
        }

        footer {
            border-top: 1px solid var(--border);
            padding: 24px 48px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .footer-note { font-size: 11px; color: var(--text-dim); }

        .back-link {
            font-size: 11px;
            color: var(--text-dim);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--text-mid); }

        @media (max-width: 500px) {
            header, footer { padding: 20px 24px; }
            main { padding: 32px 24px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="/"><img src="validity-logo.png" alt="Validity" style="height:28px;filter:brightness(1.1);" /></a>
        <span class="header-label">Demo</span>
    </header>

    <main>
        <div class="cards">

            <a href="/demo-freddie" class="card">
                <span class="card-industry">Structured Finance</span>
                <span class="card-title">Freddie Mac MSCR Trust MN9</span>
            </a>

            <a href="/demo-anaheim" class="card">
                <span class="card-industry">Commercial Contracts</span>
                <span class="card-title">City of Anaheim / JLL</span>
            </a>

        </div>
    </main>

    <footer>
        <span class="footer-note">validity.live</span>
        <a href="/" class="back-link">← Back</a>
    </footer>

</body>
</html>
